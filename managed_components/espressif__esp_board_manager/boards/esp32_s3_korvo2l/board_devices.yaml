# Devices Configuration
devices:
  - name: audio_dac
    chip: es8311
    type: audio_codec
    version: default
    config:
      adc_enabled: false
      dac_enabled: true
      dac_max_channel: 1
      # DAC channel mask, 1-enable, 0-disable, layout: left,right
      dac_channel_mask: "1"     # Left enable

    # Power amplifier configuration
    peripherals:
      - name: gpio_pa_control
        gain: 6                    # dB
        active_level: 1            # 0-low, 1-high

      # I2S interface configuration
      - name: i2s_audio_out
      # I2C interface configuration
      - &es8311_i2c_master
        name: i2c_master
        address: 0x30
        frequency: 400000          # Hz

  - name: audio_adc
    chip: es8311
    type: audio_codec
    version: default
    # NOTE:
    # The physical ES8311 supports full-duplex, but board manager models it as two
    # logical single-direction devices: `audio_adc` and `audio_dac`.
    config:
      adc_enabled: true
      adc_max_channel: 1
      # The channel mask, 1-enable, 0-disable
      # e.g.“0111”, bit0: Mic0 enable, bit1: Mic1 enable, bit2: Mic2 enable, bit3: Mic3 enable, bit4: Mic4 disable
      adc_channel_mask: "1"            # Mic0 enable
      adc_channel_labels: ['RE','FC']  # Mic0 and reference enable, MSB ~ LSB
      dac_enabled: false

    peripherals:
      - name: i2s_audio_in
      - *es8311_i2c_master

  - name: fs_sdcard       # The name of the device, must be unique
    type: fs_fat          # The type of the device, must be unique
    version: default
    sub_type: sdmmc
    config:
      sub_config:
        bus_width: 1                      # Bus width: 1, 4, or 8 bits
        # GPIO pin configuration
        pins:
          clk: 6                         # Clock pin (-1 for not used)
          cmd: 7                         # Command pin (-1 for not used)
          d0: 4                          # Data line 0 pin (-1 for not used)

  - name: fs_spiffs          # The name of the device, must be unique
    type: fs_spiffs          # The type of the device, must be unique
    version: 1.0.0
    config:
      partition_label: NULL           # The partition label for the SPIFFS filesystem
      format_if_mount_failed: true

  # ADC Button Devices Configuration for multiple buttons
  - name: adc_button_group
    type: button
    sub_type: adc_multi
    config:
      long_press_time: 2000
      short_press_time: 100
      events_cfg:
        press_down: true
        press_up: true
        single_click: true
        double_click: true
        multi_click: false
        long_press_start: true
        long_press_up: true
        long_press_hold: false
        press_repeat: false
        press_repeat_done: false
        press_end: false
      button_num: 6
      max_voltage: 3000
      voltage_range: [380, 820, 1110, 1650, 1980, 2410]
      button_labels: ["VOLUME_UP", "VOLUME_DOWN", "SET", "PLAY", "MUTE", "REC"]
    peripherals:
    - name: adc_oneshot
