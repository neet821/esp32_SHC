# Devices Configuration for ESP32-C5 Spot AI Voice Interaction Module
devices:
  # Power management and control devices
  - name: power_control
    type: gpio_ctrl
    version: default
    config:
      active_level: 1
      default_level: 0
    peripherals:
      - name: gpio_power_control

  - name: codec_power
    type: power_ctrl
    sub_type: gpio
    peripherals:
    - name: gpio_power_codec
      active_level: 1

  - name: audio_adc
    chip: es8311
    type: audio_codec
    version: default
    config:
      adc_enabled: true
    peripherals:
      - name: i2s_audio_in
      - &es8311_i2c_master
        name: i2c_master
        address: 0x30
        frequency: 400000          # Hz

  - name: audio_dac
    chip: es8311
    type: audio_codec
    version: default
    power_ctrl_device: codec_power
    config:
      dac_enabled: true
    peripherals:
      - name: i2s_audio_out
      - name: gpio_pa_control
        gain: 0                        # dB
        active_level: 1                # 0-low, 1-high
      - *es8311_i2c_master
