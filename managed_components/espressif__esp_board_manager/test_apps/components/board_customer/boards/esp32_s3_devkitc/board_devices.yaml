  #   sub_type: spi
  #   config:
  #     sub_config:
  #       cs_gpio_num: 8
  #     peripherals:
  #       - name: "spi_master"  # SPI bus name

  - name: gpio_button_0
    type: button
    sub_type: gpio
    config:
      events_cfg:
        press_down: true
        press_up: true
        single_click: true
        double_click: true
        multi_click: true
        click_counts: [3, 4, 5]
        long_press_start: true
        long_press_start_time: [3000, 4000, 5000]
        long_press_up: true
        long_press_up_time: [3000, 4000, 5000]
        long_press_hold: false
        press_repeat: false
        press_repeat_done: false
        press_end: false
      active_level: 1
      long_press_time: 2000
      short_press_time: 100
    peripherals:
      - name: gpio_button

  - name: led_strip
    type: led_strip
    chip: ws2812
    sub_type: spi
    config:
      strip_gpio_num: 48
      max_leds: 1
      led_model: LED_MODEL_WS2812
      color_component_format: LED_STRIP_COLOR_COMPONENT_FMT_GRB
      invert_out: false
      spi:
        clk_src: SPI_CLK_SRC_DEFAULT
        spi_bus: SPI3_HOST
        with_dma: true
